<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ממריאים לעסקים 2026</title>

<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '923648707097354');
fbq('track', 'PageView');
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f8fc;
}
.wrap{max-width:1100px;margin:auto;padding:20px}
.hero{text-align:center;padding:60px 20px}
.hero h1{font-size:42px;margin-bottom:10px}
.hero p{color:#555}
.card{
  background:#fff;
  border-radius:20px;
  padding:30px;
  margin-top:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08)
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}
.item{
  background:#fff;
  padding:20px;
  border-radius:15px;
}
form{display:grid;gap:10px}
input,select,textarea{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#24496d;
  color:#fff;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}
.btn-coral{
  background:linear-gradient(180deg,#FF8A65,#FF7F5C);
  color:#fff;
  padding:18px 32px;
  border-radius:999px;
  display:inline-block;
  font-weight:bold;
  font-size:18px;
  text-decoration:none;
  box-shadow:0 10px 30px rgba(255,138,101,.26);
  transition:.2s ease;
  text-align:center;
  margin:30px 0;
  border:none;
  cursor:pointer;
}
.btn-coral:hover{
  transform:translateY(-1px);
  box-shadow:0 12px 35px rgba(255,138,101,.32);
}
.button-container{text-align:center}
.success{display:none;color:green;font-weight:bold}
.error{display:none;color:red;font-weight:bold}

@media(max-width:768px){
  .grid{grid-template-columns:1fr}
}
</style>

</head>

<body>

<div class="wrap">

<!-- HERO -->
<div class="hero">
<h1>קורס הכשרת מנחים<br>ממריאים לעסקים 2026</h1>
<p>למד להוביל, להנחות ולבנות ביטחון אמיתי</p>
</div>

<!-- BENEFITS -->
<div class="grid">
<div class="item">ביטחון מול קהל</div>
<div class="item">הובלת קבוצות</div>
<div class="item">בניית הכנסה</div>
</div>

<!-- BUTTON -->
<div class="button-container">
<a href="https://www.canva.com/design/DAG2CLvwSWo/BhYYGjy3sILBi5O1dYusAg/view?utm_content=DAG2CLvwSWo&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=h52e3e16b5f" class="btn-coral">לפוצאת התכניות המלאה</a>
</div>

<!-- FORM -->
<div class="card">

<div id="successBox" class="success">נשלח בהצלחה ✅</div>
<div id="errorBox" class="error">שגיאה בשליחה ❌</div>

<form id="leadForm">

<input id="fullName" placeholder="שם מלא" required>
<input id="phone" placeholder="טלפון" required>
<input id="email" placeholder="אימייל">

<select id="interest">
<option>מידע כללי</option>
<option>בדיקת התאמה</option>
<option>הרשמה</option>
</select>

<textarea id="message" placeholder="הערה נוספת"></textarea>

<button type="submit">שלחו פרטים</button>

</form>

</div>

</div>

<script>

const WEBHOOK = "https://script.google.com/macros/s/AKfycbziFrybD9D76PKBnaCp821S4vFPYSTbF_2aFP12awKesdq91G5QI-C-mMB439BFKWj2lA/exec";

const form = document.getElementById("leadForm");
const successBox = document.getElementById("successBox");
const errorBox = document.getElementById("errorBox");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  successBox.style.display = "none";
  errorBox.style.display = "none";

  const data = {
    fullName: document.getElementById("fullName").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    interest: document.getElementById("interest").value,
    message: document.getElementById("message").value
  };

  try {
    await fetch(WEBHOOK,{
      method:"POST",
      body: JSON.stringify(data)
    });

    successBox.style.display = "block";

    // 🔥 FIXED PIXEL (WITH EVENT ID)
    if (typeof fbq === "function") {
      const eventId = Date.now().toString();
      fbq('track', 'Lead', {}, { eventID: eventId });
    }

    // WhatsApp
    setTimeout(()=>{
      const msg = encodeURIComponent("היי, השארתי פרטים לגבי הקורס");
      window.open("https://wa.me/972523809797?text=" + msg, "_blank");
    },500);

    form.reset();

  } catch(err){
    errorBox.style.display = "block";
    console.error(err);
  }

});
</script>

</body>
</html>
