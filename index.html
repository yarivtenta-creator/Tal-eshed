<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ממריאים לעסקים 2026</title>

<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '923648707097354');
fbq('track', 'PageView');
</script>

<style>
body{font-family:Arial;margin:0;background:#f6f8fc}
.wrap{max-width:800px;margin:auto;padding:20px;text-align:center}
h1{font-size:32px}
.card{background:#fff;padding:20px;border-radius:20px;margin-top:20px}
button{background:#24496d;color:#fff;padding:15px;border:none;border-radius:12px;width:100%;font-size:18px}
input,select,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc}
</style>

</head>

<body>

<div class="wrap">

<h1>קורס הכשרת מנחים<br>ממריאים לעסקים 2026</h1>
<p>למד להוביל, להנחות ולבנות ביטחון אמיתי</p>

<div class="card">

<form id="leadForm">

<input id="fullName" placeholder="שם מלא" required>
<input id="phone" placeholder="טלפון" required>
<input id="email" placeholder="אימייל">

<select id="interest">
<option>מידע כללי</option>
<option>בדיקת התאמה</option>
<option>הרשמה</option>
</select>

<textarea id="message" placeholder="הערה נוספת"></textarea>

<button type="submit">שלחו פרטים</button>

</form>

</div>

</div>

<script>

const WEBHOOK = "https://script.google.com/macros/s/AKfycbziFrybD9D76PKBnaCp821S4vFPYSTbF_2aFP12awKesdq91G5QI-C-mMB439BFKWj2lA/exec";

document.getElementById("leadForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const data = {
    fullName: document.getElementById("fullName").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    interest: document.getElementById("interest").value,
    message: document.getElementById("message").value
  };

  try {
    await fetch(WEBHOOK,{
      method:"POST",
      body: JSON.stringify(data)
    });

    alert("נשלח בהצלחה ✅");

    if (typeof fbq === "function") {
      fbq('track', 'Lead');
    }

    setTimeout(()=>{
      const msg = encodeURIComponent("היי, השארתי פרטים לגבי הקורס");
      window.open("https://wa.me/972523809797?text=" + msg, "_blank");
    },500);

  } catch(err){
    alert("שגיאה בשליחה ❌");
    console.error(err);
  }

});
</script>

</body>
</html>
