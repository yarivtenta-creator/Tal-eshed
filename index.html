<noscript>

<style>
body{font-family:Arial;margin:0;background:#f6f8fc;text-align:center}
.container{max-width:600px;margin:auto;padding:20px}
h1{font-size:28px}
button{background:#24496d;color:#fff;padding:15px;border:none;border-radius:10px;width:100%;font-size:18px}
input{width:100%;padding:12px;margin:10px 0}
</style>
</head>

<body>

<div class="container">

<h1>הופכים ידע להכנסה אמיתית</h1>
<p>למד להוביל, להנחות ולבנות ביטחון</p>

<form id="form">
<input name="name" placeholder="שם מלא" required>
<input name="phone" placeholder="טלפון" required>
<input name="email" placeholder="אימייל">
<button type="submit">קבל פרטים</button>
</form>

</div>

<script>

const WEBHOOK = "https://script.google.com/macros/s/AKfycbziFrybD9D76PKBnaCp821S4vFPYSTbF_2aFP12awKesdq91G5QI-C-mMB439BFKWj2lA/exec";

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const form = e.target;

  const data = {
    fullName: form.name.value,
    phone: form.phone.value,
    email: form.email.value,
    submittedAt: new Date().toISOString()
  };

  try {
    await fetch(WEBHOOK, {
      method: "POST",
      body: JSON.stringify(data)
    });

    alert("נשלח בהצלחה ✅");

    // Pixel Lead event
    if (typeof fbq === "function") {
      fbq('track', 'Lead');
    }

    // WhatsApp redirect
    window.location.href = "https://wa.me/972523809797?text=השארתי פרטים לקורס";

  } catch (err) {
    alert("שגיאה בשליחה ❌");
    console.error(err);
  }
});
</script>

</body>
</html>
